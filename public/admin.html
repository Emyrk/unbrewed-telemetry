<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unbrewed Admin</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22252f;
      --border: #2a2d37;
      --text: #e4e6eb;
      --text-muted: #8b8fa3;
      --accent: #6c63ff;
      --accent-hover: #5a52e0;
      --danger: #e05252;
      --danger-hover: #c93c3c;
      --success: #4caf50;
      --warn: #e6a817;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Archivo', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 1.1rem; font-weight: 600; }
    .topbar .links { display: flex; gap: 1rem; align-items: center; }
    .topbar a, .topbar button.link { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; background: none; border: none; cursor: pointer; font-family: var(--sans); }
    .topbar a:hover, .topbar button.link:hover { color: var(--text); }
    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    .btn { font-family: var(--sans); font-size: 0.85rem; font-weight: 600; padding: 0.5rem 1.2rem; border: none; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: var(--danger-hover); }
    .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }
    .btn-ghost { background: var(--surface-hover); color: var(--text); border: 1px solid var(--border); }
    .error-msg { color: var(--danger); font-size: 0.85rem; }
    .success-msg { color: var(--success); font-size: 0.85rem; }

    #auth-gate { display: flex; flex-direction: column; align-items: center; gap: 1rem; margin-top: 4rem; }
    #auth-gate label { font-size: 0.95rem; color: var(--text-muted); }
    #auth-gate input { font-family: var(--mono); font-size: 0.9rem; padding: 0.6rem 1rem; width: 360px; max-width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; }
    #auth-gate input:focus { border-color: var(--accent); }
    .or-divider { color: var(--text-muted); font-size: 0.85rem; }

    #admin-content { display: none; }
    .section { margin-bottom: 2.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .admin-table th { text-align: left; padding: 0.6rem 0.8rem; border-bottom: 2px solid var(--border); color: var(--text-muted); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .admin-table td { padding: 0.55rem 0.8rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .admin-table tr:hover td { background: var(--surface-hover); }
    .mono { font-family: var(--mono); font-size: 0.82rem; }
    .muted { color: var(--text-muted); font-size: 0.8rem; }
    .empty-state { text-align: center; color: var(--text-muted); padding: 3rem 1rem; font-size: 0.9rem; }

    .key-display { background: var(--surface); border: 1px solid var(--accent); border-radius: 6px; padding: 0.8rem 1rem; font-family: var(--mono); font-size: 0.82rem; word-break: break-all; margin: 0.5rem 0; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; }
    .badge-active { background: #1a3a1a; color: var(--success); }
    .badge-revoked { background: #3a1a1a; color: var(--danger); }
    .badge-scope { background: var(--surface-hover); color: var(--text-muted); margin-right: 0.25rem; }
    .badge-completed { background: #1a3a1a; color: var(--success); }
    .badge-cancelled { background: #3a1a1a; color: var(--danger); }
    .badge-paused { background: #3a3a1a; color: var(--warn); }

    .form-row { display: flex; gap: 0.6rem; margin-bottom: 0.8rem; align-items: center; flex-wrap: wrap; }
    .form-row input, .form-row select, .form-row textarea { font-family: var(--mono); font-size: 0.85rem; padding: 0.4rem 0.6rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; }
    .form-row input:focus, .form-row textarea:focus { border-color: var(--accent); }
    .form-row textarea { min-height: 80px; width: 100%; resize: vertical; }

    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .confirm-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; max-width: 440px; width: 90%; }
    .confirm-box h3 { font-size: 1rem; margin-bottom: 0.5rem; }
    .confirm-box p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.2rem; line-height: 1.5; }
    .confirm-box .actions { display: flex; gap: 0.6rem; justify-content: flex-end; }
    .confirm-box .btn-cancel { background: var(--surface-hover); color: var(--text); border: 1px solid var(--border); }
    .stats-bar { display: flex; gap: 2rem; margin-bottom: 2rem; padding: 1rem; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); flex-wrap: wrap; }
    .stat-item .stat-value { font-family: var(--mono); font-size: 1.3rem; font-weight: 600; }
    .stat-item .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 1.5rem; }
    .tab { padding: 0.6rem 1.2rem; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; background: none; border-top: 0; border-left: 0; border-right: 0; font-family: var(--sans); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover { color: var(--text); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Unbrewed Admin</h1>
    <div class="links">
      <span id="user-info" class="muted"></span>
      <a href="/dashboard">← Dashboard</a>
      <button class="link" id="logout-btn" style="display:none" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="container">
    <div id="auth-gate">
      <a class="btn btn-primary" href="/auth/discord">Login with Discord</a>
      <div class="or-divider">— or —</div>
      <label for="secret-input">Enter admin secret</label>
      <input id="secret-input" type="password" placeholder="telemetry secret" autocomplete="off">
      <button class="btn btn-ghost" onclick="doLegacyAuth()">Authenticate</button>
      <div id="auth-error" class="error-msg"></div>
    </div>

    <div id="admin-content">
      <div class="tab-bar">
        <button class="tab active" data-tab="decks">Decks</button>
        <button class="tab" data-tab="sources">Sources &amp; Keys</button>
        <button class="tab" data-tab="campaigns">Campaigns</button>
      </div>

      <!-- Decks tab -->
      <div id="tab-decks" class="tab-panel active">
        <div id="stats-bar" class="stats-bar"></div>
        <div class="section-title">Deck Definitions</div>
        <div id="deck-list"></div>
        <div id="action-status"></div>
      </div>

      <!-- Sources tab -->
      <div id="tab-sources" class="tab-panel">
        <div class="section">
          <div class="section-title">Telemetry Sources</div>
          <div class="form-row">
            <input id="new-source-name" placeholder="source name" style="width:200px">
            <input id="new-source-desc" placeholder="description (optional)" style="width:300px">
            <button class="btn btn-primary btn-sm" onclick="createSource()">Create Source</button>
          </div>
          <div id="sources-list"></div>
        </div>
        <div id="new-key-display" style="display:none">
          <p class="success-msg">API key created — copy it now, it will not be shown again:</p>
          <div class="key-display" id="new-key-value"></div>
        </div>
      </div>

      <!-- Campaigns tab -->
      <div id="tab-campaigns" class="tab-panel">
        <div class="section">
          <div class="section-title">Simulation Campaigns</div>
          <div class="form-row">
            <input id="campaign-name" placeholder="campaign name" style="width:200px">
            <input id="campaign-seed" placeholder="base seed (0)" style="width:120px" type="number">
            <button class="btn btn-primary btn-sm" onclick="showCampaignForm()">New Campaign</button>
          </div>
          <div id="campaign-form" style="display:none;margin-bottom:1rem">
            <div class="form-row"><textarea id="campaign-json" placeholder='{"spec":{...},"games":[{},{},...]}' style="font-size:0.8rem"></textarea></div>
            <div class="form-row"><button class="btn btn-primary btn-sm" onclick="createCampaign()">Create</button></div>
          </div>
          <div id="campaigns-list"></div>
          <div id="campaign-detail" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="confirm-overlay" class="confirm-overlay" style="display:none">
    <div class="confirm-box">
      <h3 id="confirm-title">Confirm</h3>
      <p id="confirm-body"></p>
      <div class="actions">
        <button class="btn btn-cancel btn-sm" onclick="closeConfirm()">Cancel</button>
        <button id="confirm-btn" class="btn btn-danger btn-sm">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    let secret = '';
    let authMethod = null; // 'discord' | 'legacy'

    // ----- API helper -----
    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin' };
      if (secret) opts.headers['Authorization'] = `Bearer ${secret}`;
      if (body !== undefined) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      return { status: res.status, data: await res.json() };
    }

    // ----- Tab switching -----
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // ----- Auth -----
    async function checkSession() {
      try {
        const { status, data } = await api('GET', '/v1/admin/me');
        if (status === 200 && data.ok) {
          authMethod = data.authMethod;
          showAdmin(data.discordUsername || 'admin');
          return true;
        }
      } catch {}
      return false;
    }

    async function doLegacyAuth() {
      secret = document.getElementById('secret-input').value.trim();
      if (!secret) return;
      try {
        const { status } = await api('GET', '/v1/admin/decks');
        if (status === 401 || status === 403) {
          document.getElementById('auth-error').textContent = 'Invalid secret';
          return;
        }
        authMethod = 'legacy';
        sessionStorage.setItem('admin-secret', secret);
        showAdmin('legacy-admin');
      } catch { document.getElementById('auth-error').textContent = 'Connection error'; }
    }

    function showAdmin(username) {
      document.getElementById('auth-gate').style.display = 'none';
      document.getElementById('admin-content').style.display = 'block';
      document.getElementById('user-info').textContent = username;
      if (authMethod === 'discord') document.getElementById('logout-btn').style.display = '';
      loadDecks();
      loadSources();
      loadCampaigns();
    }

    async function doLogout() {
      await api('POST', '/auth/logout');
      secret = '';
      authMethod = null;
      sessionStorage.removeItem('admin-secret');
      location.reload();
    }

    // ----- Decks -----
    async function loadDecks() {
      const { data } = await api('GET', '/v1/admin/decks');
      renderDecks(data);
    }

    function renderDecks(data) {
      const statsBar = document.getElementById('stats-bar');
      statsBar.innerHTML = `
        <div class="stat-item"><div class="stat-value">${data.totalDecks ?? 0}</div><div class="stat-label">Definitions</div></div>
        <div class="stat-item"><div class="stat-value">${data.totalGames ?? 0}</div><div class="stat-label">Games</div></div>
      `;
      const container = document.getElementById('deck-list');
      if (!data.decks || data.decks.length === 0) { container.innerHTML = '<div class="empty-state">No deck definitions.</div>'; return; }
      let html = `<table class="admin-table"><thead><tr><th>Deck</th><th>Name</th><th>Versions</th><th style="text-align:right">Games</th><th style="text-align:right">Actions</th></tr></thead><tbody>`;
      for (const d of data.decks) {
        html += `<tr><td class="mono">${esc(d.deckId)}</td><td>${esc(d.name||'—')}</td><td class="muted">${esc(d.versions.join(', '))}</td><td class="mono" style="text-align:right">${d.gameCount}</td><td style="text-align:right"><button class="btn btn-danger btn-sm" onclick="confirmDelete('${esc(d.deckId)}',${d.gameCount})">Delete</button></td></tr>`;
      }
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function confirmDelete(deckId, gc) {
      document.getElementById('confirm-title').textContent = `Delete ${deckId}?`;
      document.getElementById('confirm-body').textContent = `Delete all versions of "${deckId}". ${gc > 0 ? gc + ' game(s) will also be removed.' : ''}`;
      document.getElementById('confirm-btn').onclick = () => doDelete(deckId);
      document.getElementById('confirm-overlay').style.display = 'flex';
    }
    function closeConfirm() { document.getElementById('confirm-overlay').style.display = 'none'; }
    async function doDelete(deckId) {
      closeConfirm();
      const { status, data } = await api('DELETE', `/v1/admin/deck?deck=${encodeURIComponent(deckId)}`);
      document.getElementById('action-status').innerHTML = status === 200 && data.ok
        ? `<p class="success-msg">Deleted ${esc(deckId)}: ${data.deletedDefinitions} def(s), ${data.deletedGames} game(s).</p>`
        : `<p class="error-msg">${esc(data.message||'Error')}</p>`;
      loadDecks();
    }

    // ----- Sources & Credentials -----
    async function loadSources() {
      const { data } = await api('GET', '/v1/admin/sources');
      renderSources(data.sources || []);
    }

    function renderSources(sources) {
      const el = document.getElementById('sources-list');
      if (sources.length === 0) { el.innerHTML = '<div class="empty-state">No sources.</div>'; return; }
      let html = '';
      for (const s of sources) {
        html += `<div style="margin-bottom:1.5rem;padding:1rem;background:var(--surface);border:1px solid var(--border);border-radius:8px">`;
        html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem"><strong>${esc(s.name)}</strong><button class="btn btn-danger btn-sm" onclick="deleteSource('${s.id}')">Delete</button></div>`;
        html += `<div class="muted" style="margin-bottom:0.5rem">${esc(s.description||'')}</div>`;
        html += `<div class="form-row"><input id="cred-label-${s.id}" placeholder="key label" style="width:160px"><select id="cred-scopes-${s.id}" multiple style="width:300px;height:60px"><option value="games:submit" selected>games:submit</option><option value="decks:submit">decks:submit</option><option value="sim:claim">sim:claim</option><option value="sim:complete">sim:complete</option></select><button class="btn btn-primary btn-sm" onclick="createCredential('${s.id}')">Create Key</button></div>`;
        if (s.credentials.length) {
          html += `<table class="admin-table" style="margin-top:0.5rem"><thead><tr><th>Key ID</th><th>Label</th><th>Scopes</th><th>Status</th><th>Last Used</th><th></th></tr></thead><tbody>`;
          for (const c of s.credentials) {
            const revoked = !!c.revokedAt;
            html += `<tr><td class="mono">${esc(c.id)}</td><td>${esc(c.label)}</td><td>${c.scopes.map(sc=>`<span class="badge badge-scope">${esc(sc)}</span>`).join('')}</td><td>${revoked?'<span class="badge badge-revoked">revoked</span>':'<span class="badge badge-active">active</span>'}</td><td class="muted">${c.lastUsedAt?new Date(c.lastUsedAt).toLocaleString():'never'}</td><td>${!revoked?`<button class="btn btn-danger btn-sm" onclick="revokeCredential('${c.id}')">Revoke</button>`:''}</td></tr>`;
          }
          html += '</tbody></table>';
        }
        html += '</div>';
      }
      el.innerHTML = html;
    }

    async function createSource() {
      const name = document.getElementById('new-source-name').value.trim();
      if (!name) return;
      const desc = document.getElementById('new-source-desc').value.trim();
      await api('POST', '/v1/admin/sources', { name, description: desc || undefined });
      document.getElementById('new-source-name').value = '';
      document.getElementById('new-source-desc').value = '';
      loadSources();
    }

    async function deleteSource(id) {
      await api('DELETE', `/v1/admin/sources?id=${id}`);
      loadSources();
    }

    async function createCredential(sourceId) {
      const label = document.getElementById('cred-label-' + sourceId).value.trim();
      if (!label) return;
      const sel = document.getElementById('cred-scopes-' + sourceId);
      const scopes = Array.from(sel.selectedOptions).map(o => o.value);
      const { data } = await api('POST', '/v1/admin/credentials', { sourceId, label, scopes });
      if (data.ok && data.credential) {
        document.getElementById('new-key-display').style.display = 'block';
        document.getElementById('new-key-value').textContent = data.credential.fullKey;
      }
      loadSources();
    }

    async function revokeCredential(id) {
      await api('POST', '/v1/admin/credentials/revoke', { credentialId: id });
      loadSources();
    }

    // ----- Campaigns -----
    async function loadCampaigns() {
      const { data } = await api('GET', '/v1/admin/campaigns');
      renderCampaigns(data.campaigns || []);
    }

    function renderCampaigns(campaigns) {
      const el = document.getElementById('campaigns-list');
      if (campaigns.length === 0) { el.innerHTML = '<div class="empty-state">No campaigns.</div>'; return; }
      let html = `<table class="admin-table"><thead><tr><th>Name</th><th>Status</th><th>Progress</th><th>Created</th><th></th></tr></thead><tbody>`;
      for (const c of campaigns) {
        const badge = c.status === 'completed' ? 'badge-completed' : c.status === 'cancelled' ? 'badge-cancelled' : c.status === 'paused' ? 'badge-paused' : 'badge-active';
        html += `<tr><td>${esc(c.name)}</td><td><span class="badge ${badge}">${c.status}</span></td><td class="mono">${c.completedGames}/${c.totalGames} (${c.failedGames} failed)</td><td class="muted">${new Date(c.createdAt).toLocaleDateString()}</td><td><button class="btn btn-ghost btn-sm" onclick="viewCampaign('${c.id}')">View</button> ${c.status==='active'?`<button class="btn btn-danger btn-sm" onclick="cancelCampaign('${c.id}')">Cancel</button>`:''}</td></tr>`;
      }
      html += '</tbody></table>';
      el.innerHTML = html;
    }

    function showCampaignForm() {
      document.getElementById('campaign-form').style.display = document.getElementById('campaign-form').style.display === 'none' ? '' : 'none';
    }

    async function createCampaign() {
      const name = document.getElementById('campaign-name').value.trim();
      if (!name) return;
      const seed = parseInt(document.getElementById('campaign-seed').value) || 0;
      let json;
      try { json = JSON.parse(document.getElementById('campaign-json').value); }
      catch { alert('Invalid JSON'); return; }
      await api('POST', '/v1/admin/campaigns', { name, baseSeed: seed, ...json });
      document.getElementById('campaign-form').style.display = 'none';
      loadCampaigns();
    }

    async function cancelCampaign(id) {
      await api('POST', '/v1/admin/campaign/cancel', { campaignId: id });
      loadCampaigns();
    }

    async function viewCampaign(id) {
      const { data } = await api('GET', `/v1/admin/campaign?id=${id}`);
      if (!data.ok) return;
      const c = data.campaign;
      let html = `<h3>${esc(c.name)}</h3><div class="muted" style="margin:0.5rem 0">Status: ${c.status} | ${c.completedGames}/${c.totalGames} completed, ${c.failedGames} failed | Base seed: ${c.baseSeed}</div>`;
      if (c.jobs && c.jobs.length) {
        html += `<table class="admin-table"><thead><tr><th>#</th><th>Seed</th><th>Status</th><th>Attempts</th><th>Error</th></tr></thead><tbody>`;
        for (const j of c.jobs) {
          html += `<tr><td class="mono">${j.gameIndex}</td><td class="mono">${j.seed}</td><td>${j.status}</td><td class="mono">${j.attempts}/${j.maxAttempts}</td><td class="muted">${esc(j.lastError||'')}</td></tr>`;
        }
        html += '</tbody></table>';
      } else { html += '<div class="muted" style="margin-top:0.5rem">All jobs completed or deleted.</div>'; }
      html += `<button class="btn btn-ghost btn-sm" style="margin-top:0.5rem" onclick="document.getElementById('campaign-detail').style.display='none'">Close</button>`;
      document.getElementById('campaign-detail').innerHTML = html;
      document.getElementById('campaign-detail').style.display = '';
    }

    // ----- Helpers -----
    function esc(s) { const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }

    // ----- Init -----
    (async function() {
      if (await checkSession()) return;
      const saved = sessionStorage.getItem('admin-secret');
      if (saved) { secret = saved; if (await checkSession()) return; doLegacyAuth(); }
      document.getElementById('secret-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLegacyAuth(); });
    })();
  </script>
</body>
</html>
