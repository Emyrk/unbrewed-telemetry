services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: unbrewed
      POSTGRES_PASSWORD: unbrewed
      POSTGRES_DB: unbrewed_telemetry
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unbrewed -d unbrewed_telemetry"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
